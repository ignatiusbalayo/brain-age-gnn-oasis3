name: Score Submission

on:
  pull_request:
    paths:
      - 'submissions/*.enc'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn pycryptodome pyyaml tabulate

      - name: Run Evaluation
        id: eval
        env:
          TEST_LABELS: ${{ secrets.TEST_LABELS }}
          RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
        run: |
          # 1. Get all .enc files with their timestamps
          # This logic specifically pairs each file with the timestamp of the commit it was in
          ALL_FILES_WITH_TIME=$(git log --format="%ct" --name-only origin/main...HEAD | awk '
            /^[0-9]+$/ { current_time=$1; next }
            /\.enc$/ { print current_time, $0 }
          ' | sort -nr)

          # 2. Extract just the filename of the most recent one (top of the list)
          FILE=$(echo "$ALL_FILES_WITH_TIME" | head -n 1 | cut -d' ' -f2-)

          if [ -z "$FILE" ]; then
            echo "ERROR: No .enc file detected."
            exit 1
          fi

          # 3. Check for multiples for the PR note
          UNIQUE_FILES=$(echo "$ALL_FILES_WITH_TIME" | cut -d' ' -f2- | sort -u)
          COUNT=$(echo "$UNIQUE_FILES" | wc -l)

          if [ "$COUNT" -gt 1 ]; then
            MULTIPLE_NOTE="⚠️ **Note:** $COUNT submission files were detected. We evaluated the most recently committed file: \`$FILE\`."
          else
            MULTIPLE_NOTE=""
          fi
          echo "multi_note=$MULTIPLE_NOTE" >> $GITHUB_OUTPUT

          # 4. Extract Team Name (e.g., submissions/team_a.enc -> team_a)
          FILENAME=$(basename "$FILE")
          TEAM_NAME="${FILENAME%.*}"
          echo "team_name=$TEAM_NAME" >> $GITHUB_OUTPUT
          
          # 5. Run the actual evaluation
          python competition/evaluate.py --file "$FILE" | tee out.txt
          
          # 6. Extract the score from the python output
          RAW_SCORE=$(grep "SCORE_MAE" out.txt | awk '{print $2}')
          
          if [ -z "$RAW_SCORE" ] || [ "$RAW_SCORE" == "None" ]; then
            echo "score=Error" >> $GITHUB_OUTPUT
          else
            # Ensure 8 decimal precision
            FORMATTED_SCORE=$(printf "%.8f" $RAW_SCORE)
            echo "score=$FORMATTED_SCORE" >> $GITHUB_OUTPUT
          fi

      - name: Post Score to PR
        uses: mshick/add-pr-comment@v2
        if: always()
        with:
          message: |
            ## 🧠 Brain-Age GNN Submission Result
            
            **Team:** `${{ steps.eval.outputs.team_name }}`
            **Score (MAE):** `${{ steps.eval.outputs.score }}`
            
            ${{ steps.eval.outputs.multi_note }}
            
            ---
            *Note: The official leaderboard will update automatically once this Pull Request is merged into the main branch.*