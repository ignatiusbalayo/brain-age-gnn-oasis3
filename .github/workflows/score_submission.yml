name: Score Submission

on:
  pull_request:
    paths:
      - 'submissions/*.enc'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn pycryptodome pyyaml tabulate

      - name: Run Evaluation
        id: eval
        env:
          TEST_LABELS: ${{ secrets.TEST_LABELS }}
          RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
        run: |
          # 1. Get files with their commit timestamps, sorted by newest (largest timestamp) first
          # This looks at all commits unique to this PR branch
          ALL_FILES_WITH_TIME=$(git log --format="%ct" --name-only origin/main...HEAD | awk 'NF==1 {t=$1; next} {print t, $0}' | grep '\.enc$' | sort -nr)

          # 2. Extract just the filename of the most recent one (top of the sorted list)
          FILE=$(echo "$ALL_FILES_WITH_TIME" | head -n 1 | awk '{print $2}')

          # 3. Get a unique list of all .enc files to check for multiples
          UNIQUE_FILES=$(echo "$ALL_FILES_WITH_TIME" | awk '{print $2}' | sort -u)
          COUNT=$(echo "$UNIQUE_FILES" | wc -l)

          if [ -z "$FILE" ]; then
            echo "No .enc file detected."
            exit 1
          fi

          # 4. Create the warning if multiples exist
          if [ "$COUNT" -gt 1 ]; then
            MULTIPLE_NOTE="⚠️ **Note:** $COUNT submission files were detected. We evaluated the most recently committed file: \`$FILE\`."
          else
            MULTIPLE_NOTE=""
          fi
          echo "multi_note=$MULTIPLE_NOTE" >> $GITHUB_OUTPUT

      - name: Post Score to PR
        uses: mshick/add-pr-comment@v2
        if: always()
        with:
          message: |
            ## 🧠 Brain-Age GNN Submission Result
            
            **Team:** `${{ steps.eval.outputs.team_name }}`
            **Score (MAE):** `${{ steps.eval.outputs.score }}`
            
            ---
            *Note: The official leaderboard will update automatically once this Pull Request is merged into the main branch.*